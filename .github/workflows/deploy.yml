name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          command_timeout: 25m
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH || '/opt/russianbeargroup' }}"
            if [ ! -f scripts/deploy.sh ]; then
              echo "scripts/deploy.sh not found — falling back to inline deploy"
              git fetch origin main
              git reset --hard origin/main
              COMPOSE="docker compose -f docker-compose.yml"
              if [ -d certbot/conf/live ]; then
                COMPOSE="$COMPOSE -f docker-compose.prod.yml"
              fi
              $COMPOSE build
              $COMPOSE up -d --remove-orphans
              $COMPOSE ps
              exit 0
            fi
            chmod +x scripts/deploy.sh
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH || '/opt/russianbeargroup' }}" bash scripts/deploy.sh
