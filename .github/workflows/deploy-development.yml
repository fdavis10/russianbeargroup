name: Deploy Development

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: deploy-development
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy preview to VPS
    runs-on: ubuntu-latest
    environment: preview
    timeout-minutes: 30

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          command_timeout: 25m
          script: |
            set -euo pipefail
            DEV_PATH="${{ secrets.DEPLOY_PATH_DEV || '/opt/russianbeargroup-dev' }}"
            cd "$DEV_PATH"
            if [ ! -f scripts/deploy-dev.sh ]; then
              echo "scripts/deploy-dev.sh not found — pull develop first"
              exit 1
            fi
            chmod +x scripts/deploy-dev.sh
            DEPLOY_PATH="$DEV_PATH" \
              PROD_DEPLOY_PATH="${{ secrets.DEPLOY_PATH || '/opt/russianbeargroup' }}" \
              bash scripts/deploy-dev.sh
