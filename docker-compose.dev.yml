# Preview-стек: без своего nginx/bot/backup.
# Порты только на localhost — edge nginx прода проксирует на них.
#
# Запуск:
#   docker compose -p russianbear-dev -f docker-compose.yml -f docker-compose.dev.yml up -d --build

services:
  backend:
    ports:
      - "127.0.0.1:8001:8000"

  frontend:
    ports:
      - "127.0.0.1:8081:80"

  # Порты 80/443 заняты продом
  nginx:
    profiles: ["disabled"]

  # Не конфликтовать с боевым ботом и бэкапами
  bot:
    profiles: ["disabled"]

  backup:
    profiles: ["disabled"]
