services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_PATH: /app/data/db.sqlite3
    volumes:
      - backend_data:/app/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/content/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  bot:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_PATH: /app/data/db.sqlite3
    entrypoint: ["python", "manage.py", "runtelegrambot"]
    volumes:
      - backend_data:/app/data
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    expose:
      - "80"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

  backup:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_PATH: /app/data/db.sqlite3
      BACKUP_DIR: /app/backups
    entrypoint: ["python", "run_backup_scheduler.py"]
    volumes:
      - backend_data:/app/data
      - ./backups:/app/backups
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend_data:
