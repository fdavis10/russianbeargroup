services:
  backend:
    networks:
      default:
      edge:
        aliases:
          - backend-prod

  frontend:
    networks:
      default:
      edge:
        aliases:
          - frontend-prod

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot
      # Сертификаты с хоста (certbot --standalone на VPS)
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - default
      - edge

  certbot:
    image: certbot/certbot:latest
    profiles: ["certbot"]
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt

networks:
  edge:
    external: true
    name: russianbear-edge
